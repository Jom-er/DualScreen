name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install ffmpeg
      run: |
        choco install ffmpeg
        echo "C:\ProgramData\chocolatey\bin" >> $env:PATH

    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --hidden-import PyQt5.QtCore --hidden-import PyQt5.QtGui --hidden-import PyQt5.QtWidgets --hidden-import mss --hidden-import pyaudio --hidden-import ffmpeg --hidden-import numpy --hidden-import cv2 main.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DualScreen-Windows
        path: dist/main.exe